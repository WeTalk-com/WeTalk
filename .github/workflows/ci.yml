name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check-types
      - run: npm run test
      - run: npm run build

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  trivy:
    name: Trivy — Docker image scan
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - post-service
          - notification-service
          - web
          - gateway
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (${{ matrix.service }})
        run: docker build -t wetalk/${{ matrix.service }} -f apps/${{ matrix.service }}/Dockerfile .
