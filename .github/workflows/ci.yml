name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (lint → typecheck → test → build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check-types
      - run: npm test
      - run: npm run build -- --filter=!message-service --filter=!media-service --filter=!notification-service

  codeql:
    name: CodeQL
    needs: quality
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3

  trivy:
    name: Trivy
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, user-service, post-service, web, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: docker build -f apps/${{ matrix.service }}/Dockerfile -t wetalk/${{ matrix.service }} .
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: wetalk/${{ matrix.service }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
