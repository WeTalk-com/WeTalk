services:
  redis:
    image: redis:7-alpine
    container_name: wetalk-redis
    restart: unless-stopped
    networks:
      - wetalk-net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: wetalk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wetalk-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:7
    container_name: wetalk-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - wetalk-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: wetalk-auth-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wetalk-net
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: wetalk-user-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      MEDIA_SERVICE_URL: http://media-service:4004
      POST_SERVICE_URL: http://post-service:4002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      media-service:
        condition: service_healthy
    networks:
      - wetalk-net
    expose:
      - "4001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  message-service:
    build:
      context: .
      dockerfile: apps/message-service/Dockerfile
    container_name: wetalk-message-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4004
      USER_SERVICE_URL: http://user-service:4001
      MONGO_URI: ${MONGO_URI_MESSAGE:-mongodb://mongo:27017/wetalk_message}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - wetalk-net
    expose:
      - "4004"
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:4004/health',r=>process.exit(r.statusCode<300?0:1)).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  post-service:
    build:
      context: .
      dockerfile: apps/post-service/Dockerfile
    container_name: wetalk-post-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI_POST:-mongodb://mongo:27017/wetalk_posts}
      USER_SERVICE_URL: http://user-service:4001
      MEDIA_SERVICE_URL: http://media-service:4004
    depends_on:
      mongo:
        condition: service_healthy
      user-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    networks:
      - wetalk-net
    expose:
      - "4002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  media-service:
    build:
      context: .
      dockerfile: apps/media-service/Dockerfile
    container_name: wetalk-media-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4004
      UPLOAD_DIR: /data/uploads
    volumes:
      - media_data:/data/uploads
    networks:
      - wetalk-net
    expose:
      - "4004"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4004/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: wetalk-notification-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI_NOTIFICATIONS:-mongodb://mongo:27017/wetalk_notifications}
      USER_SERVICE_URL: http://user-service:4001
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - wetalk-net
    expose:
      - "4003"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4003/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GIPHY_KEY: ${NEXT_PUBLIC_GIPHY_KEY:-}
    container_name: wetalk-web
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - wetalk-net
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: wetalk-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      post-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      web:
        condition: service_healthy
      agent:
        condition: service_started
    networks:
      - wetalk-net

  provisioner:
    build:
      context: apps/provisioner
      dockerfile: Dockerfile
    container_name: wetalk-provisioner
    restart: "no"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      media-service:
        condition: service_healthy
      # Créent les tables Postgres (users / Follows) via Sequelize sync.
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - wetalk-net

  ollama:
    image: ollama/ollama:latest
    container_name: wetalk-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - wetalk-net
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  chromadb:
    image: chromadb/chroma:latest
    container_name: wetalk-chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - wetalk-net
    expose:
      - "8000"

  agent:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    container_name: wetalk-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - wetalk-net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    develop:
      watch:
        - action: sync+restart
          path: ./apps/agent
          target: /app/agent
          ignore:
            - __pycache__/
        - action: rebuild
          path: ./apps/agent/requirements.txt

networks:
  wetalk-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  media_data:
  ollama_data:
  chroma_data: