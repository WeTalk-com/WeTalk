# Compose de prod pour Dokploy.
# Différences vs docker-compose.yml (dev) :
#   - gateway : plus de port 80 publié sur l'hôte (Caddy tient déjà le 80) ;
#     gateway rejoint dokploy-network + labels Traefik pour le routage.
#   - mongo : plus de port publié sur l'hôte (accès interne uniquement).
# Dokploy pointe sur ce fichier ; le routage public passe par Caddy -> Traefik -> gateway.
services:
  redis:
    image: redis:7-alpine
    container_name: wetalk-redis
    restart: unless-stopped
    networks:
      - wetalk-net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: wetalk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wetalk-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:7
    container_name: wetalk-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - wetalk-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: wetalk-auth-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wetalk-net
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: wetalk-user-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      MEDIA_SERVICE_URL: http://media-service:4004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      media-service:
        condition: service_healthy
    networks:
      - wetalk-net
    expose:
      - "4001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  message-service:
    build:
      context: .
      dockerfile: apps/message-service/Dockerfile
    container_name: wetalk-message-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4004
      USER_SERVICE_URL: http://user-service:4001
      MONGO_URI: ${MONGO_URI_MESSAGE}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - wetalk-net
    expose:
      - "4004"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4004/health',r=>process.exit(r.statusCode<300?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  post-service:
    build:
      context: .
      dockerfile: apps/post-service/Dockerfile
    container_name: wetalk-post-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI_POST}
      USER_SERVICE_URL: http://user-service:4001
      MEDIA_SERVICE_URL: http://media-service:4004
    depends_on:
      mongo:
        condition: service_healthy
      user-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    networks:
      - wetalk-net
    expose:
      - "4002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  media-service:
    build:
      context: .
      dockerfile: apps/media-service/Dockerfile
    container_name: wetalk-media-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4004
      UPLOAD_DIR: /data/uploads
    volumes:
      - media_data:/data/uploads
    networks:
      - wetalk-net
    expose:
      - "4004"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4004/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: wetalk-web
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - wetalk-net
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: wetalk-gateway
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      post-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - wetalk-net
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.wetalk.rule=Host(`wetalk.rynproject.online`)
      - traefik.http.routers.wetalk.entrypoints=web
      - traefik.http.routers.wetalk.service=wetalk
      - traefik.http.services.wetalk.loadbalancer.server.port=80

networks:
  wetalk-net:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  postgres_data:
  mongo_data:
  media_data:
