map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream auth_service {
    server auth-service:4000;
}

upstream user_service {
    server user-service:4001;
}

upstream post_service {
    server post-service:4002;
}

upstream media_service {
    server media-service:4004;
}

upstream message_service {
    server message-service:4004;
}
upstream notification_service {
    server notification-service:4003;
}

upstream web_app {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # Couvre l'upload de vidéos (FX19) relayé vers le media-service.
    client_max_body_size 60M;

    # API Gateway routes
    location /api/auth/ {
        proxy_pass http://auth_service/auth/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api/users/ {
        proxy_pass http://user_service/users/;
        include /etc/nginx/proxy_params.conf;
    }
    # Collection sans slash final (liste + creation) : exact match vers post-service.
    location = /api/posts {
        proxy_pass http://post_service/posts;
        include /etc/nginx/proxy_params.conf;
    }
    location /api/posts/ {
        proxy_pass http://post_service/posts/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api/media/ {
        proxy_pass http://media_service/media/;
        include /etc/nginx/proxy_params.conf;
    }
    
    location /api/comments/ {
        proxy_pass http://post_service/comments/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/tags/ {
        proxy_pass http://post_service/tags/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/admin/ {
        proxy_pass http://post_service/admin/;
        include /etc/nginx/proxy_params.conf;
    }
    # Route service-a-service
    location ~ ^/api/notifications/internal(?:/|$) {
        return 404;
    }
    location /api/notifications/ {
        proxy_pass http://notification_service/notifications/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/socket.io/notifications/ {
        proxy_pass http://notification_service/socket.io/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api/messages {
        proxy_pass http://message_service/messages;
        include /etc/nginx/proxy_params.conf;
    }
    location /api/messages/ {
        proxy_pass http://message_service/messages/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api/socket.io/messages/ {
        proxy_pass http://message_service/socket.io/;
        include /etc/nginx/proxy_params.conf;
    }

    # Swagger documentation
    location /api-docs/auth/ {
        proxy_pass http://auth_service/api-docs/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api-docs/users/ {
        proxy_pass http://user_service/api-docs/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api-docs/posts/ {
        proxy_pass http://post_service/api-docs/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api-docs/notifications/ {
        proxy_pass http://notification_service/api-docs/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api-docs/messages/ {
        proxy_pass http://message_service/api-docs/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api-docs/media/ {
        proxy_pass http://media_service/api-docs/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api-docs/ {
        proxy_pass http://auth_service/api-docs/;
        include /etc/nginx/proxy_params.conf;
    }

    # Front (toutes les autres routes)
    location / {
        proxy_pass http://web_app/;
        include /etc/nginx/proxy_params.conf;
    }
}