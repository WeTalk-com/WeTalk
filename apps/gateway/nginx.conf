upstream auth_service {
    server auth-service:4000;
}
upstream user_service {
    server user-service:4001;
}
upstream post_service {
    server post-service:4002;
}
upstream notification_service {
    server notification-service:4003;
}
upstream web_app {
    server web:3000;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    client_max_body_size 20M;

    # Certificat Nginx (TLS)
    ssl_certificate     /etc/nginx/certs/gateway/gateway.crt;
    ssl_certificate_key /etc/nginx/certs/gateway/gateway.key;

    # CA interne pour vérifier les clients
    ssl_client_certificate /etc/nginx/certs/ca/ca.crt;
    ssl_verify_client optional;  

    # Paramètres TLS  
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Routes API ──
    location /api/auth/ {
        proxy_pass https://auth_service/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/users/ {
        proxy_pass https://user_service/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/posts/ {
        proxy_pass https://post_service/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/notifications/ {
        proxy_pass https://notification_service/;
        include /etc/nginx/proxy_params.conf;
    }

    # Frontend
    location / {
        proxy_pass https://web_app/;
        include /etc/nginx/proxy_params.conf;
    }
}