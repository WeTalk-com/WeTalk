map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream auth_service {
    server auth-service:4000;
}

upstream user_service {
    server user-service:4001;
}

upstream post_service {
    server post-service:4002;
}

# Desactive tant que notification-service n'est pas implemente (feature notifications).
# Reactiver l'upstream + le location /api/notifications/ a ce moment-la.
# upstream notification_service {
#     server notification-service:4003;
# }

upstream web_app {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # API Gateway routes
    location /api/auth/ {
        proxy_pass http://auth_service/auth/;
        include /etc/nginx/proxy_params.conf;
    }
    location /api/users/ {
        proxy_pass http://user_service/users/;
        include /etc/nginx/proxy_params.conf;
    }
    # Collection sans slash final (liste + creation) : exact match vers post-service.
    location = /api/posts {
        proxy_pass http://post_service/posts;
        include /etc/nginx/proxy_params.conf;
    }
    location /api/posts/ {
        proxy_pass http://post_service/posts/;
        include /etc/nginx/proxy_params.conf;
    }
    # location /api/notifications/ {
    #     proxy_pass http://notification_service/notifications/;
    #     include /etc/nginx/proxy_params.conf;
    # }

    # Front (toutes les autres routes)
    location / {
        proxy_pass http://web_app/;
        include /etc/nginx/proxy_params.conf;
    }
}